syntax = "proto3";

package api;

option go_package = "lunar-tear/server/gen/proto";

import "common.proto";
import "google/protobuf/empty.proto";

service QuestService {
  rpc UpdateMainFlowSceneProgress(UpdateMainFlowSceneProgressRequest) returns (UpdateMainFlowSceneProgressResponse);
  rpc UpdateReplayFlowSceneProgress(UpdateReplayFlowSceneProgressRequest) returns (UpdateReplayFlowSceneProgressResponse);
  rpc UpdateMainQuestSceneProgress(UpdateMainQuestSceneProgressRequest) returns (UpdateMainQuestSceneProgressResponse);
  rpc StartMainQuest(StartMainQuestRequest) returns (StartMainQuestResponse);
  rpc FinishMainQuest(FinishMainQuestRequest) returns (FinishMainQuestResponse);
  rpc FinishAutoOrbit(google.protobuf.Empty) returns (FinishAutoOrbitResponse);
  rpc SetQuestSceneChoice(SetQuestSceneChoiceRequest) returns (SetQuestSceneChoiceResponse);
}

message UpdateMainFlowSceneProgressRequest {
  int32 quest_scene_id = 1;
}

message UpdateMainFlowSceneProgressResponse {
  map<string, DiffData> diff_user_data = 1;
}

message UpdateReplayFlowSceneProgressRequest {
  int32 quest_scene_id = 1;
}

message UpdateReplayFlowSceneProgressResponse {
  map<string, DiffData> diff_user_data = 1;
}

message UpdateMainQuestSceneProgressRequest {
  int32 quest_scene_id = 1;
}

message UpdateMainQuestSceneProgressResponse {
  map<string, DiffData> diff_user_data = 1;
}

message CageMeasurableValues {
  int32 running_distance_meters = 1;
  int32 mama_tapped_count = 2;
}

message BattleDropReward {
  int32 quest_scene_id = 1;
  int32 battle_drop_category_id = 2;
  int32 battle_drop_effect_id = 3;
}

message StartMainQuestRequest {
  int32 quest_id = 1;
  bool is_main_flow = 2;
  int32 user_deck_number = 3;
  bool is_battle_only = 4;
  int32 max_auto_orbit_count = 5;
  bool is_replay_flow = 6;
  CageMeasurableValues cage_measurable_values = 7;
}

message StartMainQuestResponse {
  repeated BattleDropReward battle_drop_reward = 1;
  map<string, DiffData> diff_user_data = 2;
}

message FinishMainQuestRequest {
  int32 quest_id = 1;
  bool is_retired = 2;
  bool is_main_flow = 3;
  bool is_annihilated = 4;
  bool is_auto_orbit = 5;
  int32 story_skip_type = 6;
  bool is_replay_flow = 7;
  string vt = 8;
}

message FinishMainQuestResponse {
  repeated QuestReward drop_reward = 1;
  repeated QuestReward first_clear_reward = 2;
  repeated QuestReward mission_clear_reward = 3;
  repeated QuestReward mission_clear_complete_reward = 4;
  repeated QuestReward auto_orbit_result = 5;
  bool is_big_win = 6;
  repeated int32 big_win_cleared_quest_mission_id_list = 7;
  repeated QuestReward replay_flow_first_clear_reward = 8;
  repeated QuestReward user_status_campaign_reward = 9;
  QuestAutoOrbitResult auto_orbit_reward = 10;
  map<string, DiffData> diff_user_data = 11;
}

message QuestReward {
  int32 possession_type = 1;
  int32 possession_id = 2;
  int32 count = 3;
}

message QuestAutoOrbitResult {
  int32 total_count = 1;
}

message FinishAutoOrbitResponse {
  repeated QuestReward auto_orbit_result = 1;
  QuestAutoOrbitResult auto_orbit_reward = 2;
  map<string, DiffData> diff_user_data = 3;
}

message SetQuestSceneChoiceRequest {
  int32 quest_scene_id = 1;
  int32 quest_scene_choice_effect_id = 2;
}

message SetQuestSceneChoiceResponse {
  map<string, DiffData> diff_user_data = 1;
}
