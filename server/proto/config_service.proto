syntax = "proto3";

package api;

option go_package = "lunar-tear/server/gen/proto";

import "google/protobuf/empty.proto";
import "common.proto";

service ConfigService {
  rpc GetReviewServerConfig(google.protobuf.Empty) returns (GetReviewServerConfigResponse);
}

message GetReviewServerConfigResponse {
  ApiConfig api = 1;
  OctoConfig octo = 2;
  WebViewConfig web_view = 3;
  MasterDataConfig master_data = 4;
  map<string, DiffData> diff_user_data = 99;
}
